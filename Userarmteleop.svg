<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1400" viewBox="0 0 720 1400">
  <defs>
    <style>
      .link { fill:#111; }
      .joint { fill:#6b3fa0; stroke:#2a1a3f; stroke-width:4; }
      .bracket { fill:#2b2b2b; stroke:#111; stroke-width:4; }
      .handle { fill:#0d0d0d; stroke:#000; stroke-width:4; }
      .note { font: 18px/1.25 Arial, Helvetica, sans-serif; fill:#222; }
      .noteSmall { font: 16px/1.2 Arial, Helvetica, sans-serif; fill:#222; }
      .thin { stroke:#444; stroke-width:4; fill:none; opacity:0.25; }
      .call { stroke:#333; stroke-width:3; fill:none; }
      .tag { fill:#f6f1ff; stroke:#2a1a3f; stroke-width:2; rx:10; }
      .chip { fill:#1b8a6b; stroke:#0a3a2d; stroke-width:3; }
      .chipText { font: 15px Arial, Helvetica, sans-serif; fill:#eafff8; font-weight:700; }
    </style>

    <!-- Arrow marker for callouts -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#333"></path>
    </marker>
  </defs>

  <!-- Title -->
  <text x="20" y="40" class="note" font-weight="700">User-side TeleOp Arm (simplified)</text>
  <text x="20" y="68" class="note">Top = shoulder bracket • Bottom = handle • Purple = rotational encoder joints</text>

  <!-- Centerline (guide) -->
  <path class="thin" d="M300 90 L300 1320"></path>

  <!-- Shoulder bracket (top) -->
  <rect x="130" y="95" width="340" height="95" rx="28" class="bracket"></rect>
  <rect x="180" y="120" width="240" height="45" rx="18" fill="#3a3a3a"></rect>

  <!-- E1 (shoulder) -->
  <circle cx="300" cy="230" r="44" class="joint"></circle>
  <circle cx="300" cy="230" r="16" fill="#e6d7ff" opacity="0.85"></circle>

  <!-- Link 1 -->
  <rect x="278" y="274" width="44" height="245" rx="22" class="link"></rect>

  <!-- E2 -->
  <circle cx="300" cy="560" r="44" class="joint"></circle>
  <circle cx="300" cy="560" r="16" fill="#e6d7ff" opacity="0.85"></circle>

  <!-- Link 2 -->
  <rect x="278" y="604" width="44" height="260" rx="22" class="link"></rect>

  <!-- E3 -->
  <circle cx="300" cy="910" r="44" class="joint"></circle>
  <circle cx="300" cy="910" r="16" fill="#e6d7ff" opacity="0.85"></circle>

  <!-- Link 3 -->
  <rect x="278" y="954" width="44" height="210" rx="22" class="link"></rect>

  <!-- E4 (bottom elbow) -->
  <circle cx="300" cy="1210" r="44" class="joint"></circle>
  <circle cx="300" cy="1210" r="16" fill="#e6d7ff" opacity="0.85"></circle>

  <!-- Short horizontal link to handle -->
  <rect x="300" y="1188" width="170" height="44" rx="22" class="link"></rect>

  <!-- E5 (by handle) -->
  <circle cx="490" cy="1210" r="44" class="joint"></circle>
  <circle cx="490" cy="1210" r="16" fill="#e6d7ff" opacity="0.85"></circle>

  <!-- Handle -->
  <rect x="430" y="1258" width="120" height="120" rx="26" class="handle"></rect>
  <rect x="448" y="1280" width="84" height="22" rx="10" fill="#1e1e1e"></rect>
  <rect x="448" y="1316" width="84" height="22" rx="10" fill="#1e1e1e"></rect>

  <!-- BMI160 module on handle -->
  <rect x="456" y="1348" width="68" height="22" rx="6" class="chip"></rect>
  <text x="490" y="1364" text-anchor="middle" class="chipText">BMI160</text>

  <!-- Labels (right side) -->
  <!-- E1 -->
  <path class="call" d="M344 230 L560 230" marker-end="url(#arrow)"></path>
  <rect x="565" y="206" width="140" height="48" class="tag"></rect>
  <text x="575" y="227" class="noteSmall" font-weight="700">Encoder 1</text>
  <text x="575" y="247" class="noteSmall">Yaw</text>

  <!-- E2 -->
  <path class="call" d="M344 560 L560 560" marker-end="url(#arrow)"></path>
  <rect x="565" y="536" width="140" height="48" class="tag"></rect>
  <text x="575" y="557" class="noteSmall" font-weight="700">Encoder 2</text>
  <text x="575" y="577" class="noteSmall">Roll</text>

  <!-- E3 -->
  <path class="call" d="M344 910 L560 910" marker-end="url(#arrow)"></path>
  <rect x="565" y="886" width="140" height="48" class="tag"></rect>
  <text x="575" y="907" class="noteSmall" font-weight="700">Encoder 3</text>
  <text x="575" y="927" class="noteSmall">Roll</text>

  <!-- E4 -->
  <path class="call" d="M344 1210 L560 1210" marker-end="url(#arrow)"></path>
  <rect x="565" y="1186" width="140" height="48" class="tag"></rect>
  <text x="575" y="1207" class="noteSmall" font-weight="700">Encoder 4</text>
  <text x="575" y="1227" class="noteSmall">Roll</text>

  <!-- E5 -->
  <path class="call" d="M534 1210 L560 1250" marker-end="url(#arrow)"></path>
  <rect x="565" y="1226" width="140" height="58" class="tag"></rect>
  <text x="575" y="1247" class="noteSmall" font-weight="700">Encoder 5</text>
  <text x="575" y="1267" class="noteSmall">Yaw</text>

  <!-- BMI160 callout -->
  <path class="call" d="M524 1359 L560 1335" marker-end="url(#arrow)"></path>
  <rect x="565" y="1308" width="140" height="60" class="tag"></rect>
  <text x="575" y="1329" class="noteSmall" font-weight="700">BMI160</text>
  <text x="575" y="1349" class="noteSmall">Handle IMU</text>
  <text x="575" y="1367" class="noteSmall">6DoF</text>

  <!-- Footer note -->
  <text x="20" y="1385" class="noteSmall" opacity="0.8">
    Enc1=Yaw (shoulder) • Enc2=Roll • Enc3=Roll • Enc4=Roll • Enc5=Yaw (by handle)
  </text>
</svg>
